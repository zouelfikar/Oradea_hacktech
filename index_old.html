<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport's Assistant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #0e0e0e;
            --paper: #f5f2ec;
            --accent: #c8503a;
            --accent2: #2a6e5e;
            --muted: #8a8780;
            --border: #d8d4cc;
            --bubble-user: #0e0e0e;
            --bubble-ai: #fff;
            --shadow: 0 2px 24px rgba(14, 14, 14, 0.08);
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* Header */
        header {
            width: 100%;
            max-width: 760px;
            padding: 40px 24px 0;
            position: relative;
            z-index: 1;
        }

        .logo-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            color: var(--ink);
            letter-spacing: -0.5px;
        }

        .logo-tag {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            font-family: 'Syne', sans-serif;
            background: rgba(200, 80, 58, 0.08);
            padding: 2px 8px;
            border-radius: 2px;
        }

        /* API input section */
        .api-section {
            width: 100%;
            max-width: 760px;
            padding: 0 24px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .api-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .api-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
            margin-bottom: 12px;
        }

        .api-input {
            flex: 1;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            padding: 10px 14px;
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }

        .api-input:focus {
            border-color: var(--accent2);
        }

        .api-input::placeholder {
            color: var(--muted);
        }

        /* Chat area */
        .chat-wrapper {
            width: 100%;
            max-width: 760px;
            padding: 0 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .chat-box {
            flex: 1;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* Messages */
        .msg {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeUp 0.3s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg.ai {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 3px;
            font-size: 0.8rem;
            line-height: 1.65;
            position: relative;
        }

        .msg.user .bubble {
            background: var(--bubble-user);
            color: #f5f2ec;
            border-bottom-right-radius: 0;
        }

        .msg.ai .bubble {
            background: var(--bubble-ai);
            color: var(--ink);
            border: 1.5px solid var(--border);
            border-bottom-left-radius: 0;
            box-shadow: var(--shadow);
        }

        .msg-label {
            font-size: 0.58rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-weight: 500;
            margin-bottom: 5px;
            padding: 0 2px;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
            background: var(--bubble-ai);
            border: 1.5px solid var(--border);
            border-radius: 3px;
            border-bottom-left-radius: 0;
            width: fit-content;
            box-shadow: var(--shadow);
        }

        .typing span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted);
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0)
            }

            40% {
                transform: translateY(-6px)
            }
        }

        /* Input bar */
        .input-bar {
            display: flex;
            gap: 10px;
            padding: 20px 0 32px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            padding: 12px 16px;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: var(--ink);
            outline: none;
            resize: none;
            min-height: 46px;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent2);
        }

        .chat-input::placeholder {
            color: var(--muted);
        }

        .chat-input:disabled {
            background: #f9f8f5;
            cursor: not-allowed;
        }

        .send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            width: 46px;
            height: 46px;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .send-btn:hover {
            background: #a83e2c;
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Divider */
        .divider {
            width: 100%;
            max-width: 760px;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        .divider hr {
            border: none;
            border-top: 1px solid var(--border);
            margin-bottom: 0;
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            padding: 40px 20px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 2rem;
            opacity: 0.4;
            margin-bottom: 4px;
        }

        .empty-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            color: var(--ink);
            opacity: 0.4;
        }

        .empty-sub {
            font-size: 0.7rem;
            line-height: 1.6;
            max-width: 300px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-row">
            <span class="logo-name">Airport's Passenger Experience Assistant</span>
            <span class="logo-tag">Powered by Claude</span>
        </div>
    </header>

    <div class="api-section">
        <label class="api-label">Anthropic API Key</label>
        <div class="api-row">
            <input class="api-input" id="apiKey" type="password" placeholder="sk-ant-..." />
        </div>
    </div>

    <div class="divider">
        <hr>
    </div>

    <div class="chat-wrapper">
        <div class="chat-box" id="chatBox">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">◈</div>
                <div class="empty-title">Ready when you are</div>
                <p class="empty-sub">Enter your API key above to start chatting with the Assistant.</p>
            </div>
        </div>
        <div class="input-bar">
            <textarea class="chat-input" id="chatInput" placeholder="Ask about the project..." rows="1"
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let isLoading = false;

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function addMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            document.getElementById('emptyState')?.remove();

            const msg = document.createElement('div');
            msg.className = `msg ${role}`;

            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = role === 'user' ? 'You' : "Assistant";
            msg.appendChild(label);

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = formatText(text);
            msg.appendChild(bubble);

            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msg;
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const chatBox = document.getElementById('chatBox');
            const wrap = document.createElement('div');
            wrap.className = 'msg ai';
            wrap.id = 'typingMsg';
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = "Assistant";
            wrap.appendChild(label);
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            wrap.appendChild(typing);
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            document.getElementById('typingMsg')?.remove();
        }

        async function sendMessage() {
            if (isLoading) return;
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                addMessage('ai', 'Error: API key is missing. Please provide it above.');
                return;
            }

            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            conversationHistory.push({ role: 'user', content: text });

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            showTyping();

            try {
                // To customize this assistant to match the specific Claude project rules, 
                // you would update the systemPrompt below.
                const systemPrompt = `You are a sharp, friendly project assistant. Answer questions clearly and concisely. Format your responses in plain text, using ** for bold, and keeping responses tight and professional.`;

                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: systemPrompt,
                        messages: conversationHistory
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error?.message || 'API request failed');
                }
                const reply = data.content.map(i => i.text || '').join('\n').trim();

                conversationHistory.push({ role: 'assistant', content: reply });

                removeTyping();
                addMessage('ai', reply);

            } catch (err) {
                removeTyping();
                addMessage('ai', `Error: ${err.message || 'Something went wrong. Please try again.'}`);
                console.error(err);
                conversationHistory.pop(); // remove user message so they can retry
            }

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatInput').focus();
        }
    </script>
</body>

</html>
